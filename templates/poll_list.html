{% extends 'base.html' %}
{% load i18n %}
{% block content %}
    <h1>{%  trans "List of polls" %}</h1>
    <ul>
    {% for object in object_list %}
            <li>
                <a href="{% url "poll_detail" object.pk %}">
                    {{ object }}
                </a>
            </li>
    {% endfor %}
    </ul>
{% endblock %}
